plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def ciStoreFile = System.getenv("ANDROID_KEYSTORE_PATH")
def ciStorePassword = System.getenv("ANDROID_STORE_PASSWORD")
def ciKeyAlias = System.getenv("ANDROID_KEY_ALIAS")
def ciKeyPassword = System.getenv("ANDROID_KEY_PASSWORD")
def hasCiSigning = ciStoreFile && ciStorePassword && ciKeyAlias && ciKeyPassword
def hasLocalSigning = keystorePropertiesFile.exists()

android {
    namespace "com.regicems.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.regicems.app"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            if (hasCiSigning) {
                keyAlias ciKeyAlias
                keyPassword ciKeyPassword
                storeFile rootProject.file(ciStoreFile)
                storePassword ciStorePassword
            } else if (hasLocalSigning) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile rootProject.file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            if (hasCiSigning || hasLocalSigning) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }
}

flutter {
    source "../.."
}
