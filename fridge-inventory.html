<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭冰箱库存管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .add-form {
            padding: 30px;
            background: #f8f9fa;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .inventory-list {
            padding: 30px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
        }

        .item-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }

        .item-card.warning {
            border-color: #ffc107;
            background: #fffbeb;
        }

        .item-card.warning::before {
            content: '即将过期';
            position: absolute;
            top: -10px;
            right: 10px;
            background: #ffc107;
            color: #333;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .item-card.expired {
            border-color: #dc3545;
            background: #ffebee;
        }

        .item-card.expired::before {
            content: '已过期';
            position: absolute;
            top: -10px;
            right: 10px;
            background: #dc3545;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .item-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .item-info {
            margin-bottom: 8px;
            color: #666;
        }

        .item-info strong {
            color: #333;
            font-weight: 600;
        }

        .item-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            flex: 1;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-edit {
            flex: 1;
            padding: 10px;
            background: #ffc107;
            color: #333;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-edit:hover {
            background: #e0a800;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #666;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .form-row {
                flex-direction: column;
            }

            .item-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧊 家庭冰箱库存管理</h1>
            <p>轻松管理你的冰箱库存，告别浪费</p>
        </div>

        <div class="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label>物品名称</label>
                    <input type="text" id="itemName" placeholder="例如：牛奶">
                </div>
                <div class="form-group">
                    <label>数量</label>
                    <input type="number" id="itemQuantity" placeholder="1" min="1" value="1">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>类别</label>
                    <select id="itemCategory">
                        <option value="蔬菜">蔬菜</option>
                        <option value="水果">水果</option>
                        <option value="肉类">肉类</option>
                        <option value="海鲜">海鲜</option>
                        <option value="乳制品">乳制品</option>
                        <option value="饮料">饮料</option>
                        <option value="调料">调料</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>过期日期</label>
                    <input type="date" id="itemExpiry">
                </div>
            </div>
            <button class="btn-add" onclick="addItem()">➕ 添加物品</button>
        </div>

        <div class="inventory-list">
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalItems">0</h3>
                    <p>物品总数</p>
                </div>
                <div class="stat-card">
                    <h3 id="expiringSoon">0</h3>
                    <p>即将过期</p>
                </div>
                <div class="stat-card">
                    <h3 id="expiredItems">0</h3>
                    <p>已过期</p>
                </div>
            </div>
            <div id="itemList" class="item-list"></div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('fridgeInventory')) || [];

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const quantity = parseInt(document.getElementById('itemQuantity').value);
            const category = document.getElementById('itemCategory').value;
            const expiry = document.getElementById('itemExpiry').value;

            if (!name) {
                alert('请输入物品名称');
                return;
            }

            if (quantity <= 0) {
                alert('数量必须大于0');
                return;
            }

            const item = {
                id: Date.now(),
                name,
                quantity,
                category,
                expiry,
                addedDate: new Date().toISOString()
            };

            inventory.unshift(item);
            saveInventory();
            renderInventory();
            clearForm();
        }

        function deleteItem(id) {
            if (confirm('确定要删除这个物品吗？')) {
                inventory = inventory.filter(item => item.id !== id);
                saveInventory();
                renderInventory();
            }
        }

        function editItem(id) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                const newQuantity = prompt('请输入新的数量:', item.quantity);
                if (newQuantity !== null && !isNaN(newQuantity) && parseInt(newQuantity) > 0) {
                    item.quantity = parseInt(newQuantity);
                    saveInventory();
                    renderInventory();
                }
            }
        }

        function saveInventory() {
            localStorage.setItem('fridgeInventory', JSON.stringify(inventory));
        }

        function clearForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemQuantity').value = '1';
            document.getElementById('itemExpiry').value = '';
            document.getElementById('itemName').focus();
        }

        function isExpiringSoon(date) {
            if (!date) return false;
            const expiryDate = new Date(date);
            const today = new Date();
            const diffTime = expiryDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 3;
        }

        function isExpired(date) {
            if (!date) return false;
            const expiryDate = new Date(date);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return expiryDate < today;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '未设置';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        function renderInventory() {
            const itemList = document.getElementById('itemList');
            
            if (inventory.length === 0) {
                itemList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                        <h2>冰箱是空的</h2>
                        <p>添加一些物品开始管理你的库存吧！</p>
                    </div>
                `;
                updateStats();
                return;
            }

            itemList.innerHTML = inventory.map(item => {
                const expired = isExpired(item.expiry);
                const expiringSoon = isExpiringSoon(item.expiry);
                let cardClass = '';
                if (expired) cardClass = 'expired';
                else if (expiringSoon) cardClass = 'warning';

                return `
                    <div class="item-card ${cardClass}">
                        <div class="item-name">${item.name}</div>
                        <div class="item-info"><strong>数量:</strong> ${item.quantity}</div>
                        <div class="item-info"><strong>类别:</strong> ${item.category}</div>
                        <div class="item-info"><strong>过期日期:</strong> ${formatDate(item.expiry)}</div>
                        <div class="item-actions">
                            <button class="btn-edit" onclick="editItem(${item.id})">✏️ 编辑</button>
                            <button class="btn-delete" onclick="deleteItem(${item.id})">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');

            updateStats();
        }

        function updateStats() {
            const total = inventory.reduce((sum, item) => sum + item.quantity, 0);
            const expiringSoonCount = inventory.filter(item => isExpiringSoon(item.expiry) && !isExpired(item.expiry)).length;
            const expiredCount = inventory.filter(item => isExpired(item.expiry)).length;

            document.getElementById('totalItems').textContent = total;
            document.getElementById('expiringSoon').textContent = expiringSoonCount;
            document.getElementById('expiredItems').textContent = expiredCount;
        }

        // 设置默认过期日期为7天后
        const defaultExpiry = new Date();
        defaultExpiry.setDate(defaultExpiry.getDate() + 7);
        document.getElementById('itemExpiry').valueAsDate = defaultExpiry;

        // 初始化渲染
        renderInventory();
    </script>
</body>
</html>
