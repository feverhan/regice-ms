<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰箱库存管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>
    <div class="container-fluid py-4">
        <div class="page-shell mx-auto">
            <section class="hero p-4 mb-3">
                <div class="row g-3 align-items-center">
                    <div class="col-lg-8">
                        <div class="small opacity-75 mb-1"><i class="fas fa-snowflake"></i> 冰箱管理台</div>
                        <h1 class="h3 mb-2">冰箱库存管理系统</h1>
                        <p class="mb-0">管理库存、监控临期、AI 做菜建议与批量录入。</p>
                        <div id="dailyAdviceBox" class="daily-advice">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <div class="d-flex align-items-center gap-2">
                                    <strong>今日饮食建议</strong>
                                    <button id="refreshDailyAdviceBtn" type="button" class="btn btn-sm btn-light py-0 px-2">刷新</button>
                                </div>
                                <span id="dailyAdviceDate" class="small opacity-75"></span>
                            </div>
                            <div id="dailyAdviceText">正在加载…</div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="hero-actions">
                            <button class="hero-app-btn" onclick="openModal()"><span class="hero-app-icon"><i
                                        class="fas fa-plus"></i></span><span class="hero-app-label">新增</span></button>
                            <button class="hero-app-btn" data-bs-toggle="offcanvas" data-bs-target="#bulkImportDrawer"
                                aria-controls="bulkImportDrawer"><span class="hero-app-icon"><i
                                        class="fas fa-wand-magic-sparkles"></i></span><span
                                    class="hero-app-label">批量录入</span></button>
                            <button class="hero-app-btn" data-bs-toggle="offcanvas" data-bs-target="#recipeDrawer"
                                aria-controls="recipeDrawer"><span class="hero-app-icon"><i
                                        class="fas fa-robot"></i></span><span class="hero-app-label">AI
                                    做菜</span></button>
                            <button class="hero-app-btn" onclick="exportData()"><span class="hero-app-icon"><i
                                        class="fas fa-download"></i></span><span
                                    class="hero-app-label">导出</span></button>
                            <button class="hero-app-btn" onclick="clearExpired()"><span class="hero-app-icon"><i
                                        class="fas fa-trash"></i></span><span
                                    class="hero-app-label">清理过期</span></button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="toolbar mb-3">
                <h2 class="toolbar-title">快速搜索库存</h2>
                <div class="toolbar-filters">
                    <div class="toolbar-field"><label class="field-label" for="searchInput">关键词</label>
                        <div class="search-input-wrap"><i class="fas fa-magnifying-glass search-icon"></i><input
                                id="searchInput" type="text" class="form-control" placeholder="搜索食材名称、分类或备注"
                                oninput="renderPage()"></div>
                    </div>
                    <div class="toolbar-field"><label class="field-label" for="categoryFilter">分类</label><select
                            id="categoryFilter" class="form-select" onchange="renderPage()">
                            <option value="">全部分类</option>
                            <option value="蔬菜">蔬菜</option>
                            <option value="水果">水果</option>
                            <option value="肉类">肉类</option>
                            <option value="海鲜">海鲜</option>
                            <option value="乳制品">乳制品</option>
                            <option value="饮料">饮料</option>
                            <option value="调料">调料</option>
                            <option value="主食">主食</option>
                            <option value="速食">速食</option>
                            <option value="其他">其他</option>
                        </select></div>
                    <div class="toolbar-field"><label class="field-label" for="statusFilter">状态</label><select
                            id="statusFilter" class="form-select" onchange="renderPage()">
                            <option value="">全部状态</option>
                            <option value="expired">已过期</option>
                            <option value="warning">即将过期</option>
                            <option value="low">低库存</option>
                            <option value="normal">正常</option>
                        </select></div>
                    <div class="toolbar-field"><label class="field-label" for="sortBy">排序</label><select id="sortBy"
                            class="form-select" onchange="loadInventory()">
                            <option value="recent">按最近添加</option>
                            <option value="status">按状态优先</option>
                            <option value="expiry">按过期时间</option>
                            <option value="quantity_desc">按数量从高到低</option>
                            <option value="quantity_asc">按数量从低到高</option>
                            <option value="name">按名称</option>
                            <option value="category">按分类</option>
                        </select></div>
                </div>
            </section>

            <div class="row g-3 align-items-start">
                <div class="col-lg-9">
                    <section class="panel p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h2 class="h5 mb-0">库存列表</h2>
                        </div>
                        <div class="mb-2">
                            <h3 class="h6 mb-2">分类分布</h3>
                            <div id="categoryStats" class="d-flex flex-wrap gap-2"></div>
                        </div>
                        <div id="itemList" class="inventory-grid"></div>
                    </section>
                </div>
                <div class="col-lg-3">
                    <aside class="side p-3 position-sticky" style="top:20px;">
                        <div class="stats-strip">
                            <div class="stat-tile"><span class="stat-icon"><i class="fas fa-box-open"></i></span>
                                <div>
                                    <div class="stat-label">库存</div>
                                    <div class="stat-value" id="itemCount">0</div>
                                </div>
                            </div>
                            <div class="stat-tile"><span class="stat-icon"><i class="fas fa-hourglass-half"></i></span>
                                <div>
                                    <div class="stat-label">临期</div>
                                    <div class="stat-value" id="expiringSoon">0</div>
                                </div>
                            </div>
                            <div class="stat-tile"><span class="stat-icon"><i
                                        class="fas fa-triangle-exclamation"></i></span>
                                <div>
                                    <div class="stat-label">低库存</div>
                                    <div class="stat-value" id="lowStockCount">0</div>
                                </div>
                            </div>
                            <div class="stat-tile"><span class="stat-icon"><i class="fas fa-ban"></i></span>
                                <div>
                                    <div class="stat-label">过期</div>
                                    <div class="stat-value" id="expiredCount">0</div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h2 class="h6 mb-1">补货建议</h2>
                            <p class="small text-secondary mb-2">只显示已开启提醒且低于阈值的食材。</p>
                            <div id="shoppingList" class="d-grid gap-2"></div>
                        </div>
                    </aside>
                </div>
            </div>
        </div>
    </div>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="recipeDrawer" aria-labelledby="recipeDrawerLabel">
        <div class="offcanvas-header">
            <div>
                <h2 class="offcanvas-title h5 mb-1" id="recipeDrawerLabel">AI 做菜建议</h2>
                <p class="text-secondary mb-0">单次提问，返回完整建议。</p>
            </div><button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-grid gap-2"><textarea id="recipeDrawerQuery" class="form-control" rows="5"
                placeholder="例如：今晚做两人晚饭，优先消耗快过期食材"></textarea>
            <div class="d-flex gap-2 flex-wrap"><button class="btn btn-primary" id="recipeDrawerSubmitBtn"
                    onclick="generateRecipeSuggestions()">生成建议</button><button class="btn btn-outline-secondary"
                    onclick="fillRecipePrompt('推荐2道优先消耗临期食材的家常菜')">使用示例</button></div>
            <div class="ai-result p-3" id="recipeDrawerResult">AI 会在这里输出菜名、现有食材、缺少食材和简要做法。</div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="bulkImportDrawer" aria-labelledby="bulkImportDrawerLabel">
        <div class="offcanvas-header">
            <div>
                <h2 class="offcanvas-title h5 mb-1" id="bulkImportDrawerLabel">AI 批量录入</h2>
                <p class="text-secondary mb-0">输入文本，自动解析并新增到库存。</p>
            </div><button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-grid gap-2"><textarea id="bulkImportText" class="form-control" rows="8"
                placeholder="例如：今天买了2瓶牛奶、1把青菜、3个鸡蛋，鸡蛋下周三到期。"></textarea>
            <div class="d-flex gap-2 flex-wrap"><button class="btn btn-primary" id="bulkImportSubmitBtn"
                    onclick="bulkImportInventory()">解析并入库</button><button class="btn btn-outline-secondary"
                    type="button" onclick="fillBulkImportExample()">填入示例</button></div>
            <div class="ai-result p-3" id="bulkImportResult">这里会显示本次导入摘要。</div>
        </div>
    </div>

    <div class="modal fade item-modal" id="itemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h2 id="modalTitle" class="modal-title fs-5">新增食材</h2><button type="button" class="btn-close"
                        aria-label="Close" onclick="closeModal()"></button>
                </div>
                <div class="modal-body pt-3">
                    <form id="itemForm" onsubmit="handleSubmit(event)"><input type="hidden" id="editItemId">
                        <div class="row g-3">
                            <div class="col-sm-6"><label for="itemName" class="form-label">食材名称</label><input
                                    id="itemName" type="text" class="form-control" required></div>
                            <div class="col-sm-3"><label for="itemQuantity" class="form-label">数量</label><input
                                    id="itemQuantity" type="number" class="form-control" min="0" step="0.1" required
                                    value="1"></div>
                            <div class="col-sm-3" id="itemUnitCol"><label for="itemUnit"
                                    class="form-label">单位</label><input id="itemUnit" type="text" class="form-control"
                                    list="unitOptions" value="个" placeholder="个/把/袋/瓶"><datalist id="unitOptions">
                                    <option value="个"></option>
                                    <option value="把"></option>
                                    <option value="袋"></option>
                                    <option value="瓶"></option>
                                    <option value="盒"></option>
                                    <option value="包"></option>
                                    <option value="克"></option>
                                    <option value="千克"></option>
                                    <option value="毫升"></option>
                                    <option value="升"></option>
                                </datalist></div>
                            <div class="col-sm-6"><label for="itemCategory" class="form-label">分类</label><select
                                    id="itemCategory" class="form-select">
                                    <option value="蔬菜">蔬菜</option>
                                    <option value="水果">水果</option>
                                    <option value="肉类">肉类</option>
                                    <option value="海鲜">海鲜</option>
                                    <option value="乳制品">乳制品</option>
                                    <option value="饮料">饮料</option>
                                    <option value="调料">调料</option>
                                    <option value="主食">主食</option>
                                    <option value="速食">速食</option>
                                    <option value="其他" selected>其他</option>
                                </select></div>
                            <div class="col-sm-6"><label for="itemExpiry" class="form-label">过期日期</label><input
                                    id="itemExpiry" type="date" class="form-control"></div>
                            <div class="col-sm-6"><label for="itemMinQuantity"
                                    class="form-label">提醒值（0=不提醒）</label><input id="itemMinQuantity" type="number"
                                    class="form-control" min="0" step="0.1" required value="0"></div>
                            <div class="col-sm-6"><label for="itemQuickNote" class="form-label">简短备注</label><input
                                    id="itemQuickNote" type="text" class="form-control" placeholder="可选"></div>
                            <div class="col-12"><label for="itemNote" class="form-label">详细备注</label><textarea
                                    id="itemNote" class="form-control" rows="3" placeholder="可选"></textarea></div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-3"><button type="button"
                                class="btn btn-light border" onclick="closeModal()">取消</button><button type="submit"
                                class="btn btn-primary" id="submitBtn">保存</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>

</html>
