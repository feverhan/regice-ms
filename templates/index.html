<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭冰箱库存管理</title>
    <style>
        :root { --bg:#f4efe7; --panel:#fffdf8; --panel-strong:#f7f1e7; --text:#1f2933; --muted:#6b7280; --accent:#0f766e; --accent-strong:#115e59; --danger:#c2410c; --warning:#d97706; --border:#eadfce; --shadow:0 16px 40px rgba(56,44,22,.08); }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:"Microsoft YaHei","PingFang SC",sans-serif; background:radial-gradient(circle at top right, rgba(15,118,110,.12), transparent 28%), linear-gradient(180deg, #faf7f2 0%, var(--bg) 100%); color:var(--text); min-height:100vh; padding:24px; }
        .container { max-width:1320px; margin:0 auto; }
        .hero { margin-bottom:16px; }
        .panel { background:var(--panel); border:1px solid var(--border); border-radius:24px; box-shadow:var(--shadow); }
        .hero-main { padding:24px 26px; background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(250,247,242,.98)); position:relative; overflow:hidden; }
        .hero-main::after { content:""; position:absolute; width:220px; height:220px; border-radius:50%; right:-70px; top:-80px; background:radial-gradient(circle, rgba(15,118,110,.16), transparent 65%); pointer-events:none; }
        .eyebrow { display:inline-flex; align-items:center; gap:8px; background:rgba(15,118,110,.08); color:var(--accent-strong); padding:8px 14px; border-radius:999px; font-size:13px; margin-bottom:14px; }
        .hero-grid { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:18px; align-items:center; position:relative; z-index:1; }
        .hero-copy h1 { font-size:32px; line-height:1.12; margin-bottom:8px; letter-spacing:-.02em; }
        .hero-copy p { color:var(--muted); line-height:1.6; max-width:560px; }
        .hero-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:flex-end; }
        .btn { border:none; border-radius:14px; padding:12px 18px; font-size:14px; font-weight:600; cursor:pointer; transition:transform .18s ease, box-shadow .18s ease, background .18s ease; }
        .btn:hover { transform:translateY(-1px); }
        .btn-primary { background:var(--accent); color:#fff; box-shadow:0 10px 24px rgba(15,118,110,.2); }
        .btn-primary:hover { background:var(--accent-strong); }
        .btn-secondary { background:#efe7d8; color:var(--text); }
        .btn-danger { background:#fff0e7; color:var(--danger); }
        .toolbar { display:grid; grid-template-columns:1.4fr repeat(3, minmax(120px,180px)); gap:12px; padding:18px; margin-bottom:20px; }
        .toolbar input, .toolbar select, .form-group input, .form-group select, .form-group textarea { width:100%; border:1px solid var(--border); background:#fff; border-radius:14px; padding:13px 14px; font-size:14px; color:var(--text); }
        .toolbar input:focus, .toolbar select:focus, .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px rgba(15,118,110,.12); }
        .dashboard { display:grid; grid-template-columns:minmax(0,1fr) 260px; gap:20px; align-items:start; }
        .content-stack { display:grid; gap:16px; }
        .list-panel { padding:18px; }
        .list-panel-header, .shopping-header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
        .panel-title h2 { font-size:24px; margin-bottom:4px; }
        .panel-title p { color:var(--muted); font-size:13px; }
        .list-shell { display:grid; gap:14px; }
        .stats { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
        .stat-card { min-height:96px; padding:16px 18px; border-radius:18px; background:#fcfaf6; border:1px solid var(--border); display:flex; flex-direction:column; justify-content:space-between; }
        .stat-card p { color:var(--muted); font-size:12px; margin-bottom:8px; }
        .stat-card h3 { font-size:26px; }
        .stat-card.warning h3 { color:var(--warning); }
        .stat-card.success h3 { color:var(--accent); }
        .batch-bar, .category-row, .shopping-panel { padding:16px; }
        .batch-bar { display:none; justify-content:space-between; align-items:center; gap:12px; background:#fff5ef; }
        .batch-bar.active { display:flex; }
        .batch-actions, .category-row { display:flex; gap:10px; flex-wrap:wrap; }
        .chip { padding:8px 14px; border-radius:999px; background:var(--panel-strong); color:var(--text); border:1px solid var(--border); font-size:13px; }
        .chip span { color:var(--accent-strong); font-weight:700; margin-left:6px; }
        .item-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px,1fr)); gap:14px; }
        .item-card { position:relative; padding:18px; border-radius:20px; border:1px solid var(--border); background:linear-gradient(180deg, #fffefb, #fff9f1); }
        .item-card.warning { border-color:rgba(217,119,6,.45); }
        .item-card.expired { border-color:rgba(194,65,12,.5); background:linear-gradient(180deg, #fff8f4, #fff1eb); }
        .item-card.low-stock { box-shadow:inset 0 0 0 1px rgba(15,118,110,.18); }
        .item-checkbox { position:absolute; top:16px; left:16px; width:18px; height:18px; accent-color:var(--accent); }
        .item-top { padding-left:28px; display:flex; justify-content:space-between; gap:12px; margin-bottom:12px; }
        .item-name { font-size:18px; font-weight:700; }
        .badge-stack { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
        .badge { border-radius:999px; padding:5px 10px; font-size:12px; font-weight:700; }
        .badge-category { background:#e8f5f3; color:var(--accent-strong); }
        .badge-warning { background:#fff1d6; color:#9a6700; }
        .badge-danger { background:#ffe2d5; color:var(--danger); }
        .badge-low { background:#e6f6f4; color:var(--accent-strong); }
        .item-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding-left:28px; margin-bottom:14px; }
        .meta { display:grid; gap:4px; }
        .meta span:first-child { color:var(--muted); font-size:12px; }
        .meta strong { font-size:14px; }
        .item-note { padding-left:28px; margin-bottom:14px; color:var(--muted); font-size:13px; line-height:1.6; min-height:20px; }
        .item-actions { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; padding-left:28px; }
        .btn-small { border:none; border-radius:12px; padding:10px 12px; font-size:13px; font-weight:700; cursor:pointer; background:#efe7d8; color:var(--text); }
        .btn-small.danger { background:#fff0e7; color:var(--danger); }
        .btn-small.success { background:#e8f5f3; color:var(--accent-strong); }
        .empty-state { text-align:center; color:var(--muted); padding:56px 20px; }
        .empty-state h3 { color:var(--text); margin-bottom:8px; }
        .shopping-panel { position:sticky; top:24px; background:#fcfaf6; }
        .shopping-header .panel-title h2 { font-size:18px; }
        .shopping-list { display:grid; gap:10px; }
        .shopping-item { padding:12px 14px; border-radius:16px; border:1px solid var(--border); background:#fffaf2; }
        .shopping-item strong { display:block; margin-bottom:6px; }
        .shopping-item span { display:block; color:var(--muted); font-size:13px; line-height:1.6; }
        .modal-overlay { position:fixed; inset:0; background:rgba(23,23,23,.35); display:none; align-items:center; justify-content:center; padding:16px; z-index:20; }
        .modal-overlay.active { display:flex; }
        .modal { width:min(560px,100%); background:var(--panel); border-radius:24px; border:1px solid var(--border); box-shadow:0 24px 60px rgba(31,41,51,.18); padding:24px; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
        .modal-header h2 { font-size:22px; }
        .close-btn { border:none; background:transparent; font-size:24px; cursor:pointer; color:var(--muted); }
        .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
        .form-group { display:grid; gap:8px; margin-bottom:14px; }
        .form-group.full { grid-column:1 / -1; }
        .form-group label { font-size:13px; font-weight:700; }
        .form-group textarea { resize:vertical; min-height:88px; }
        .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:10px; }
        @media (max-width:1024px) { .hero-grid, .dashboard { grid-template-columns:1fr; } .shopping-panel { position:static; } }
        @media (max-width:720px) { body { padding:16px; } .toolbar, .form-grid, .stats, .item-grid, .item-actions { grid-template-columns:1fr; } .hero-copy h1 { font-size:28px; } .hero-actions { justify-content:flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="panel hero-main">
                <div class="eyebrow">冰箱管理台</div>
                <div class="hero-grid">
                    <div class="hero-copy">
                        <h1>家庭库存总览</h1>
                        <p>简洁管理库存、查看临期情况，并在同一页完成常用操作。</p>
                    </div>
                    <div class="hero-actions">
                        <button class="btn btn-primary" onclick="openModal()">新增物品</button>
                        <button class="btn btn-secondary" onclick="exportData()">导出数据</button>
                        <button class="btn btn-danger" onclick="clearExpired()">清理过期</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel toolbar">
            <input id="searchInput" type="text" placeholder="搜索名称、分类或备注" oninput="renderPage()">
            <select id="categoryFilter" onchange="renderPage()">
                <option value="">全部分类</option><option value="蔬菜">蔬菜</option><option value="水果">水果</option><option value="肉类">肉类</option><option value="海鲜">海鲜</option><option value="乳制品">乳制品</option><option value="饮料">饮料</option><option value="调料">调料</option><option value="主食">主食</option><option value="速食">速食</option><option value="其他">其他</option>
            </select>
            <select id="statusFilter" onchange="renderPage()">
                <option value="">全部状态</option><option value="expired">已过期</option><option value="warning">即将过期</option><option value="low">低库存</option><option value="normal">正常</option>
            </select>
            <select id="sortBy" onchange="loadInventory()">
                <option value="recent">按最近添加</option><option value="status">按状态优先</option><option value="expiry">按过期时间</option><option value="quantity_desc">按数量从高到低</option><option value="quantity_asc">按数量从低到高</option><option value="name">按名称</option><option value="category">按分类</option>
            </select>
        </section>

        <section class="dashboard">
            <div class="content-stack">
                <div class="panel list-panel">
                    <div class="list-panel-header">
                        <div class="panel-title">
                            <h2>库存列表</h2>
                            <p>这里是主工作区，优先展示库存本身。</p>
                        </div>
                    </div>
                    <div class="list-shell">
                        <div class="stats">
                            <div class="stat-card"><p>已记录物品</p><h3 id="itemCount">0</h3></div>
                            <div class="stat-card warning"><p>即将过期</p><h3 id="expiringSoon">0</h3></div>
                        </div>
                        <div class="panel batch-bar" id="batchBar">
                            <div>已选择 <strong id="selectedCount">0</strong> 项</div>
                            <div class="batch-actions">
                                <button class="btn btn-secondary" onclick="toggleSelectAll()">全选 / 取消</button>
                                <button class="btn btn-danger" onclick="batchDelete()">删除选中</button>
                            </div>
                        </div>
                        <div class="panel category-row" id="categoryStats"></div>
                        <div id="itemList" class="item-list"></div>
                    </div>
                </div>
            </div>
            <aside class="panel shopping-panel">
                <div class="shopping-header">
                    <div class="panel-title">
                        <h2>补货建议</h2>
                        <p>辅助信息，不抢主区域。</p>
                    </div>
                </div>
                <div id="shoppingList" class="shopping-list"></div>
            </aside>
        </section>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新增物品</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="itemForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="editItemId">
                <div class="form-grid">
                    <div class="form-group"><label for="itemName">物品名称</label><input id="itemName" type="text" required placeholder="例如：牛奶"></div>
                    <div class="form-group"><label for="itemQuantity">当前数量</label><input id="itemQuantity" type="number" min="0" required value="1"></div>
                    <div class="form-group"><label for="itemCategory">分类</label><select id="itemCategory"><option value="蔬菜">蔬菜</option><option value="水果">水果</option><option value="肉类">肉类</option><option value="海鲜">海鲜</option><option value="乳制品">乳制品</option><option value="饮料">饮料</option><option value="调料">调料</option><option value="主食">主食</option><option value="速食">速食</option><option value="其他" selected>其他</option></select></div>
                    <div class="form-group"><label for="itemExpiry">过期日期</label><input id="itemExpiry" type="date"></div>
                    <div class="form-group"><label for="itemMinQuantity">提醒阈值</label><input id="itemMinQuantity" type="number" min="1" required value="1"></div>
                    <div class="form-group"><label for="itemQuickNote">简短备注</label><input id="itemQuickNote" type="text" placeholder="例如：早餐常用"></div>
                    <div class="form-group full"><label for="itemNote">详细备注</label><textarea id="itemNote" placeholder="可记录品牌、存放位置、购买时间等信息"></textarea></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let inventory = [];
        let stats = { total: 0, itemCount: 0, expiringSoon: 0, expired: 0, lowStock: 0, categories: {}, shoppingList: [] };
        const selectedItems = new Set();

        async function loadInventory() {
            try {
                const sortBy = document.getElementById('sortBy').value;
                const response = await fetch(`/api/inventory?sort=${encodeURIComponent(sortBy)}`);
                inventory = await response.json();
                await loadStats();
                renderPage();
            } catch (error) {
                console.error('加载库存失败:', error);
                alert('加载库存失败，请检查服务是否正常运行。');
            }
        }

        async function loadStats() {
            const response = await fetch('/api/stats');
            stats = await response.json();
        }

        function getFilteredItems() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;

            return inventory.filter((item) => {
                const note = (item.note || '').toLowerCase();
                const matchesSearch = !searchTerm || item.name.toLowerCase().includes(searchTerm) || item.category.toLowerCase().includes(searchTerm) || note.includes(searchTerm);
                const matchesCategory = !category || item.category === category;
                let matchesStatus = true;
                if (status === 'expired') matchesStatus = item.isExpired;
                else if (status === 'warning') matchesStatus = item.isExpiringSoon && !item.isExpired;
                else if (status === 'low') matchesStatus = item.isLowStock;
                else if (status === 'normal') matchesStatus = !item.isExpired && !item.isExpiringSoon && !item.isLowStock;
                return matchesSearch && matchesCategory && matchesStatus;
            });
        }

        function renderPage() {
            renderStats();
            renderCategoryStats();
            renderShoppingList();
            renderBatchBar();
            renderInventory(getFilteredItems());
        }

        function renderStats() {
            document.getElementById('itemCount').textContent = stats.itemCount || 0;
            document.getElementById('expiringSoon').textContent = stats.expiringSoon || 0;
        }

        function renderCategoryStats() {
            const container = document.getElementById('categoryStats');
            const entries = Object.entries(stats.categories || {}).sort((a, b) => b[1] - a[1]);
            container.innerHTML = entries.length ? entries.map(([name, count]) => `<div class="chip">${escapeHtml(name)}<span>${count}</span></div>`).join('') : '<div class="chip">暂无分类统计</div>';
        }

        function renderShoppingList() {
            const container = document.getElementById('shoppingList');
            const list = stats.shoppingList || [];
            container.innerHTML = list.length ? list.map((item) => `
                <div class="shopping-item">
                    <strong>${escapeHtml(item.name)}</strong>
                    <span>当前库存 ${item.quantity}，提醒阈值 ${item.minQuantity}</span>
                    <span>建议至少补 ${Math.max(item.gap, 1)}，分类：${escapeHtml(item.category)}</span>
                </div>
            `).join('') : `<div class="empty-state"><h3>暂时没有补货项</h3><p>当物品数量低于提醒阈值时，会自动生成建议。</p></div>`;
        }

        function renderBatchBar() {
            const batchBar = document.getElementById('batchBar');
            document.getElementById('selectedCount').textContent = selectedItems.size;
            batchBar.classList.toggle('active', selectedItems.size > 0);
        }

        function renderInventory(items) {
            const container = document.getElementById('itemList');
            if (!items.length) {
                container.innerHTML = `<div class="panel empty-state" style="grid-column:1 / -1;"><h3>没有匹配的物品</h3><p>可以调整筛选条件，或者新增一条库存记录。</p></div>`;
                return;
            }

            container.innerHTML = items.map((item) => {
                const badges = [`<span class="badge badge-category">${escapeHtml(item.category)}</span>`];
                const cardClasses = ['item-card'];
                if (item.isExpired) { badges.push('<span class="badge badge-danger">已过期</span>'); cardClasses.push('expired'); }
                else if (item.isExpiringSoon) { badges.push('<span class="badge badge-warning">即将过期</span>'); cardClasses.push('warning'); }
                if (item.isLowStock) { badges.push('<span class="badge badge-low">低库存</span>'); cardClasses.push('low-stock'); }

                return `
                    <article class="${cardClasses.join(' ')}">
                        <input class="item-checkbox" type="checkbox" ${selectedItems.has(item.id) ? 'checked' : ''} onchange="toggleSelect(${item.id})">
                        <div class="item-top">
                            <div class="item-name">${escapeHtml(item.name)}</div>
                            <div class="badge-stack">${badges.join('')}</div>
                        </div>
                        <div class="item-grid">
                            <div class="meta"><span>当前数量</span><strong>${item.quantity}</strong></div>
                            <div class="meta"><span>提醒阈值</span><strong>${item.minQuantity}</strong></div>
                            <div class="meta"><span>过期日期</span><strong>${formatExpiry(item)}</strong></div>
                            <div class="meta"><span>库存状态</span><strong>${getStatusText(item)}</strong></div>
                        </div>
                        <div class="item-note">${escapeHtml(item.note || '无备注')}</div>
                        <div class="item-actions">
                            <button class="btn-small success" onclick="adjustQuantity(${item.id}, -1)">消耗 1</button>
                            <button class="btn-small success" onclick="adjustQuantity(${item.id}, 1)">补货 1</button>
                            <button class="btn-small" onclick="openEditModal(${item.id})">编辑</button>
                            <button class="btn-small danger" onclick="deleteItem(${item.id})">删除</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function getStatusText(item) {
            if (item.isExpired) return '已过期';
            if (item.isExpiringSoon) return `还有 ${item.daysUntilExpiry} 天`;
            if (item.isLowStock) return '需要补货';
            return '正常';
        }

        function formatExpiry(item) {
            if (!item.expiry) return '未设置';
            const date = new Date(item.expiry).toLocaleDateString('zh-CN');
            if (item.isExpired) return `${date}（已过期）`;
            if (item.isExpiringSoon) return `${date}（${item.daysUntilExpiry} 天内）`;
            return date;
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = '新增物品';
            document.getElementById('submitBtn').textContent = '保存';
            document.getElementById('editItemId').value = '';
            document.getElementById('itemForm').reset();
            document.getElementById('itemQuantity').value = 1;
            document.getElementById('itemMinQuantity').value = 1;
            document.getElementById('itemCategory').value = '其他';
            const nextWeek = new Date();
            nextWeek.setDate(nextWeek.getDate() + 7);
            document.getElementById('itemExpiry').valueAsDate = nextWeek;
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('itemName').focus();
        }

        function openEditModal(id) {
            const item = inventory.find((entry) => entry.id === id);
            if (!item) return;
            document.getElementById('modalTitle').textContent = '编辑物品';
            document.getElementById('submitBtn').textContent = '更新';
            document.getElementById('editItemId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemQuantity').value = item.quantity;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemExpiry').value = item.expiry || '';
            document.getElementById('itemMinQuantity').value = item.minQuantity || 1;
            const parts = (item.note || '').split('；');
            document.getElementById('itemQuickNote').value = parts[0] || '';
            document.getElementById('itemNote').value = parts.slice(1).join('；');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const editId = document.getElementById('editItemId').value;
            const quickNote = document.getElementById('itemQuickNote').value.trim();
            const note = document.getElementById('itemNote').value.trim();
            const payload = {
                name: document.getElementById('itemName').value.trim(),
                quantity: Number(document.getElementById('itemQuantity').value),
                category: document.getElementById('itemCategory').value,
                expiry: document.getElementById('itemExpiry').value,
                minQuantity: Number(document.getElementById('itemMinQuantity').value),
                note: [quickNote, note].filter(Boolean).join('；'),
            };

            try {
                const response = await fetch(editId ? `/api/inventory/${editId}` : '/api/inventory', {
                    method: editId ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const result = await response.json();
                if (!response.ok) { alert(result.error || '保存失败'); return; }
                closeModal();
                await loadInventory();
            } catch (error) {
                console.error('保存物品失败:', error);
                alert('保存失败，请稍后再试。');
            }
        }

        async function adjustQuantity(id, delta) {
            try {
                const response = await fetch(`/api/inventory/${id}/adjust`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ delta }),
                });
                const result = await response.json();
                if (!response.ok) { alert(result.error || '调整库存失败'); return; }
                await loadInventory();
            } catch (error) {
                console.error('调整库存失败:', error);
            }
        }

        async function deleteItem(id) {
            if (!confirm('确定删除这个物品吗？')) return;
            try {
                const response = await fetch(`/api/inventory/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (!response.ok) { alert(result.error || '删除失败'); return; }
                selectedItems.delete(id);
                await loadInventory();
            } catch (error) {
                console.error('删除物品失败:', error);
            }
        }

        function toggleSelect(id) {
            if (selectedItems.has(id)) selectedItems.delete(id);
            else selectedItems.add(id);
            renderPage();
        }

        function toggleSelectAll() {
            const filtered = getFilteredItems();
            const allSelected = filtered.length > 0 && filtered.every((item) => selectedItems.has(item.id));
            if (allSelected) filtered.forEach((item) => selectedItems.delete(item.id));
            else filtered.forEach((item) => selectedItems.add(item.id));
            renderPage();
        }

        async function batchDelete() {
            const ids = Array.from(selectedItems);
            if (!ids.length || !confirm(`确定删除选中的 ${ids.length} 项吗？`)) return;
            try {
                const response = await fetch('/api/inventory/batch-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids }),
                });
                const result = await response.json();
                if (!response.ok) { alert(result.error || '批量删除失败'); return; }
                selectedItems.clear();
                await loadInventory();
            } catch (error) {
                console.error('批量删除失败:', error);
            }
        }

        async function clearExpired() {
            if (!confirm('确定清理所有已过期物品吗？')) return;
            try {
                const response = await fetch('/api/inventory/clear-expired', { method: 'POST' });
                const result = await response.json();
                if (!response.ok) { alert(result.error || '清理失败'); return; }
                alert(`已清理 ${result.deleted} 个过期物品。`);
                await loadInventory();
            } catch (error) {
                console.error('清理过期物品失败:', error);
            }
        }

        async function exportData() {
            try {
                const response = await fetch('/api/export');
                const data = await response.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `fridge_inventory_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('导出失败:', error);
            }
        }

        function escapeHtml(value) {
            return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
        }

        document.getElementById('modalOverlay').addEventListener('click', (event) => {
            if (event.target.id === 'modalOverlay') closeModal();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeModal();
        });

        loadInventory();
    </script>
</body>
</html>
