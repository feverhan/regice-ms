services:
  regice-ms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regice-ms
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - PORT=${PORT:-5000}
      - HOST=${HOST:-0.0.0.0}
      - DATA_FILE=${DATA_FILE:-/data/fridge_inventory.json}
      - DAILY_ADVICE_CACHE_FILE=${DAILY_ADVICE_CACHE_FILE:-/data/daily_advice_cache.json}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-plus}
      - QWEN_BASE_URLS=${QWEN_BASE_URLS:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions,https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
    volumes:
      - ${DATA_DIR:-./data}:/data
